<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 380" width="780" height="380">
  <!-- svg-source:excalidraw -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#495057"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <rect x="40" y="40" width="340" height="320" rx="8" fill="#f8f9fa" stroke="#1e1e1e" stroke-width="2"/>
  <text x="210" y="68" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="600" fill="#1e1e1e">主线程 Main Thread</text>

  <rect x="80" y="90" width="260" height="44" rx="8" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="210" y="118" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#1e1e1e">Style 样式计算</text>
  <line x1="210" y1="134" x2="210" y2="166" stroke="#495057" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="80" y="166" width="260" height="44" rx="8" fill="#ffec99" stroke="#1e1e1e" stroke-width="2"/>
  <text x="210" y="194" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#1e1e1e">Layout 布局</text>
  <line x1="210" y1="210" x2="210" y2="242" stroke="#495057" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="80" y="242" width="260" height="44" rx="8" fill="#ffc9c9" stroke="#1e1e1e" stroke-width="2"/>
  <text x="210" y="270" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#1e1e1e">Paint 绘制</text>

  <text x="210" y="318" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" fill="#e03131">transform / opacity 可跳过 Layout</text>

  <rect x="440" y="152" width="300" height="160" rx="8" fill="#f3f0ff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="590" y="180" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="600" fill="#1e1e1e">合成线程 Compositor (GPU)</text>

  <rect x="480" y="202" width="220" height="80" rx="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="590" y="234" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#1e1e1e">Layer 1 · Layer 2</text>
  <text x="590" y="256" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#1e1e1e">Composite → 屏幕</text>

  <line x1="340" y1="264" x2="440" y2="264" stroke="#495057" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="390" y="250" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#868e96">Paint Ops</text>
</svg>
