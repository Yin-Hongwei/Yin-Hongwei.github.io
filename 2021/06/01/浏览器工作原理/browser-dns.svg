<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" width="780" height="400">
  <!-- svg-source:excalidraw -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#495057"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <rect x="40" y="172" width="140" height="56" rx="8" fill="#e9ecef" stroke="#1e1e1e" stroke-width="2"/>
  <text x="110" y="196" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#1e1e1e">用户浏览器</text>
  <text x="110" y="216" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#495057">发起查询</text>

  <rect x="240" y="172" width="140" height="56" rx="8" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="310" y="196" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#1e1e1e">本地 DNS</text>
  <text x="310" y="216" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#495057">递归解析</text>

  <rect x="440" y="52" width="140" height="56" rx="8" fill="#ffec99" stroke="#1e1e1e" stroke-width="2"/>
  <text x="510" y="84" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#1e1e1e">根 DNS</text>

  <rect x="440" y="172" width="140" height="56" rx="8" fill="#ffec99" stroke="#1e1e1e" stroke-width="2"/>
  <text x="510" y="196" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#1e1e1e">顶级 DNS</text>
  <text x="510" y="216" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#495057">(.com)</text>

  <rect x="440" y="292" width="140" height="56" rx="8" fill="#ffec99" stroke="#1e1e1e" stroke-width="2"/>
  <text x="510" y="324" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#1e1e1e">权威 DNS</text>

  <rect x="640" y="172" width="120" height="56" rx="8" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
  <text x="700" y="196" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#1e1e1e">返回 IP</text>
  <text x="700" y="216" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#495057">写入缓存</text>

  <line x1="180" y1="200" x2="240" y2="200" stroke="#495057" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="210" y="192" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#868e96">查询</text>

  <line x1="380" y1="200" x2="440" y2="80" stroke="#495057" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="380" y1="200" x2="440" y2="200" stroke="#495057" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="380" y1="200" x2="440" y2="320" stroke="#495057" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="404" y="156" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#868e96">迭代</text>
  <text x="404" y="196" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#868e96">查询</text>
  <text x="404" y="268" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#868e96">逐级</text>

  <line x1="580" y1="200" x2="640" y2="200" stroke="#495057" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="610" y="192" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#868e96">A 记录</text>
</svg>
